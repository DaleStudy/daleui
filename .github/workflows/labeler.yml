name: Labeler 🏷️

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          # 수동으로 단 다른 라벨은 건드리지 않는다.
          sync-labels: false
