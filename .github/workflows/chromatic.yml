name: "Chromatic 🎨"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [labeled, opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  # UI 관련 파일이 바뀌었는지 확인. 라벨과 OR로 묶으려고 native paths 대신 여기서 판별한다.
  # (경로는 .github/labeler.yml과 맞춰둘 것)
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      # 바뀐 파일이 아래 필터에 걸리는지 검사해 ui 출력값(true/false)을 내보낸다
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            ui:
              - "src/components/**"
              - "src/examples/**"
              - "**/*.stories.@(ts|tsx|js|jsx|mdx)"
              - ".storybook/**"
              - "src/tokens/**"
              - "src/styles/**"
              - "panda.config.ts"

  pre-chromatic:
    needs: changes
    # ui 라벨이 있거나 UI 경로가 바뀌면 실행, main push·수동 실행은 항상.
    # push/workflow_dispatch일 땐 changes가 skip이라 !cancelled()로 풀어준다.
    if: >-
      !cancelled() &&
      (github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'ui') ||
      needs.changes.outputs.ui == 'true')
    runs-on: ubuntu-latest
    steps:
      - id: gen_url
        run: |
          # Use commit hash instead of branch name to avoid 37-character limit
          URL=https://${{ github.sha }}--675790d317ba346348aa3490.chromatic.com
          echo "url=$URL" >> $GITHUB_OUTPUT
    outputs:
      url: ${{ steps.gen_url.outputs.url }}

  chromatic:
    needs: pre-chromatic
    if: needs.pre-chromatic.result == 'success'
    environment:
      name: chromatic
      url: ${{ needs.pre-chromatic.outputs.url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
        env:
          CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
          CHROMATIC_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CHROMATIC_SLUG: ${{ github.repository }}
