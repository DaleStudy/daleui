name: Integration 🔀

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  coverage:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run coverage
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

  llms-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run generate:llms
      - name: Fail if generated files differ from committed files
        run: |
          git diff --exit-code llms.txt skills/daleui/components.md skills/daleui/tokens.md \
            || (echo "❌ 생성 파일이 소스와 다릅니다. 로컬에서 'bun run generate:llms'를 실행 후 커밋하세요." && exit 1)

  install-test:
    runs-on: ubuntu-latest
    name: "Vite + React"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies & Build
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Pack library
        run: npm pack

      - name: Create test project & install daleui
        run: |
          mkdir /tmp/test-project && cd /tmp/test-project
          bun create vite@latest . --template react-ts
          bun install
          bun add "$GITHUB_WORKSPACE"/daleui-*.tgz

      - name: Add daleui smoke test
        run: |
          cd /tmp/test-project
          mkdir -p src/smoke
          cat > src/smoke/DaleTest.tsx << 'EOF'
          import { Button } from 'daleui';

          export default function DaleTest() {
            return (
              <div data-testid="daleui-smoke">
                <Button>daleui 성공적으로 로드됨!</Button>
              </div>
            );
          }
          EOF
